<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- night-purple rounded backdrop -->
  <rect width="64" height="64" rx="13" fill="#1a1030"/>

  <!-- jar lid -->
  <rect x="17" y="4" width="30" height="10" rx="3" fill="#863bff"/>
  <rect x="19" y="12" width="26" height="5" rx="2.5" fill="#6a23e6"/>

  <!-- glass jar body -->
  <rect x="11" y="15" width="42" height="45" rx="11"
        fill="#9fe8ff" fill-opacity="0.16"
        stroke="#bfefff" stroke-opacity="0.8" stroke-width="2.2"/>

  <!-- big floating smiley (drawn first, chin dips into the liquid) -->
  <circle cx="32" cy="36" r="15" fill="#ffd23f"/>
  <circle cx="26.4" cy="32" r="2.3" fill="#1a1030"/>
  <circle cx="37.6" cy="32" r="2.3" fill="#1a1030"/>
  <path d="M24.8 38.5 Q32 47 39.2 38.5" fill="none"
        stroke="#1a1030" stroke-width="2.8" stroke-linecap="round"/>

  <!-- shallow green specimen liquid across the bottom -->
  <path d="M14 48 h36 v-1 a8 8 0 0 1 -8 8 h-20 a8 8 0 0 1 -8 -8 z"
        fill="#27c59a" fill-opacity="0.85"/>
  <!-- liquid surface highlight -->
  <rect x="14" y="47" width="36" height="2.4" rx="1.2" fill="#7dffd8" fill-opacity="0.9"/>

  <!-- bubbles -->
  <circle cx="18.5" cy="52" r="1.5" fill="#d8fff4" fill-opacity="0.85"/>
  <circle cx="46" cy="53" r="1.8" fill="#d8fff4" fill-opacity="0.8"/>

  <!-- glass glare -->
  <path d="M16 22 q-2.5 16 2 31" fill="none" stroke="#ffffff" stroke-opacity="0.32"
        stroke-width="1.8" stroke-linecap="round"/>
</svg>
